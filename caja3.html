<!DOCTYPE html>

<head>

  <title>Bitea — Caja de 3 sabores</title>
  <link rel="icon" href="Imagenes/Logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="Css/styles-caja.css">
  <link rel="stylesheet" href="Css/nav.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai+Looped:wght@100;200;300;400;500;600;700;800;900&display=swap"

</head>

<body>
  <header>
    <div class="logo">
      <a href="index.html">
        <img src="Imagenes/Logo de Bitea (Blanco).png" alt="Logo Bitea" class="logo-img">

    <input type="checkbox" id="menu-toggle" class="menu-toggle">

      <span></span>
      <span></span>
      <span></span>
    </label>

    <nav id="nav-menu">
      <ul class="menu">
        <li><a href="index.html">Menú</a></li>
        <li><a href="Comprar.html">Comprar</a></li>
        <li><a href="Historia.html">Historia</a></li>
      </ul>
    </nav>
  </header>

  <section class="container caja-simple">
    <div class="box-area">
      <img src="Imagenes/Cajas/Caja sin fondo y sin sombra .png" alt="Caja Bitea" class="box-image">
    </div>

    <div class="selection-area">
      <h2 class="title">Caja de 3 sabores</h2>
      <p class="precio-caja">$10.000</p>
      <p class="descripcion-caja">Elegí 3 cupcakes de la lista. Podés indicarnos tus sabores al retirar o por WhatsApp.</p>
      <a href="https://wa.me/+541133852069?text=Hola!%20Quiero%20una%20caja%20de%203%20sabores" class="buy-button buy-button-link">Pedir por WhatsApp</a>
    </div>

    <div class="sabores-grid">
      <a href="apple.html" class="product-item product-link">
        <img src="Imagenes/Sabores/1. C. Apple Bite.png" alt="Apple Bite">
        <span>Apple Bite</span>
      </a>
      <a href="lemon.html" class="product-item product-link">
        <img src="Imagenes/Sabores/2. C Lemon Bite (SIN FONDO).png" alt="Lemon Bite">
        <span>Lemon Bite</span>
      </a>
      <a href="choco.html" class="product-item product-link">
        <img src="Imagenes/Sabores/3. C. Choco Bite (SIN FONDO).png" alt="Choco Bite">
        <span>Choco Bite</span>
      </a>
      <a href="cookie.html" class="product-item product-link">
        <img src="Imagenes/Sabores/4. C. Cookie Blast (SIN FONDO).png" alt="Cookie Blast">
        <span>Cookie Blast</span>
      </a>
      <a href="cono.html" class="product-item product-link">
        <img src="Imagenes/Sabores/5. C. Cono Cup.png" alt="Cono Cup">
        <span>Cono Cup</span>
      </a>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-links">
      <a class="footer-link"
        href="https://www.google.com/maps/place/El+Salvador+4689,+C1414+Cdad.+Aut%C3%B3noma+de+Buenos+Aires/@-34.5893949,-58.4294298,17z"
        target="_blank">
        <img src="Imagenes/Footer/Locación.png" alt="Ubicación" class="footer-icon">
        <span>Ubicación</span>
      </a>
      <a class="footer-link" href="Historia.html">
        <img src="Imagenes/Footer/Historia.png" alt="Historia" class="footer-icon">
        <span>Historia</span>
      </a>
      <a class="footer-link" href="mailto:mica_magna@hotmail.com">
        <img src="Imagenes/Footer/Contacto.png" alt="Contacto" class="footer-icon">
        <span>Contacto</span>
      </a>
    </div>

    <div class="footer-social">
      <a class="social-link" href="https://www.instagram.com/mica_magna/" target="_blank">
        <img src="Imagenes/Footer/Redes/Ig.png" alt="Instagram" class="social-icon">
      </a>
      <a class="social-link" href="https://wa.me/+541133852069" target="_blank">
        <img src="Imagenes/Footer/Redes/WhatsApp.png" alt="WhatsApp" class="social-icon">
      </a>
    </div>

    <div class="footer-logo">
      <a href="index.html">
        <img src="Imagenes/Footer/Logo Bitea (Negro) .png" alt="Logo Bitea">
      </a>
    </div>
